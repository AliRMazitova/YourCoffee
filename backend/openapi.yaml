openapi: 3.0.3
info:
  title: YourCoffee API
  version: 1.1.0
  description: |
    Backend кофейни на Express + PostgreSQL.

    После `POST /api/auth/login` передавайте заголовок
    `Authorization: Bearer <accessToken>` для защищённых маршрутов.

servers:
  - url: http://localhost:5000
    description: Local server

tags:
  - name: Health
  - name: Auth
  - name: Drinks
  - name: Catalog
  - name: Favorites
  - name: Preferences
  - name: Recommendations

paths:
  /:
    get:
      tags: [Health]
      summary: Проверка API
      responses:
        '200':
          description: OK

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Вход и выдача access/refresh token

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Обновить access token

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Удалить refresh token

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Текущий пользователь
      security: [{ bearerAuth: [] }]

  /api/drinks:
    get:
      tags: [Drinks]
      summary: Список напитков с фильтрами
      parameters:
        - in: query
          name: category
          schema: { type: integer }
        - in: query
          name: tag
          schema: { type: integer }
        - in: query
          name: is_hot
          schema: { type: boolean }
        - in: query
          name: min_price
          schema: { type: number }
        - in: query
          name: max_price
          schema: { type: number }

  /api/drinks/calculate:
    post:
      tags: [Drinks]
      summary: Рассчитать цену напитка по объёму и разрешённым добавкам

  /api/drinks/{id}:
    get:
      tags: [Drinks]
      summary: Напиток по ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }

  /api/drinks/{id}/volumes:
    get:
      tags: [Drinks]
      summary: Объёмы напитка с ценой и БЖУ из drink_volume_nutrition
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }

  /api/drinks/{id}/ingredients:
    get:
      tags: [Drinks]
      summary: Состав напитка по объёмам
      description: |
        Возвращает ингредиенты из `drink_volume_ingredients`.
        Можно передать `volume_id`, чтобы получить состав только для одного объёма.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: volume_id
          required: false
          schema: { type: integer }

  /api/drinks/{id}/tags:
    get:
      tags: [Drinks]
      summary: Теги напитка
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }

  /api/drinks/{id}/moods:
    get:
      tags: [Drinks]
      summary: Настроения напитка
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }

  /api/drinks/{id}/addons:
    get:
      tags: [Drinks]
      summary: Разрешённые добавки напитка
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }

  /api/categories:
    get:
      tags: [Catalog]
      summary: Все категории

  /api/tags:
    get:
      tags: [Catalog]
      summary: Все теги

  /api/moods:
    get:
      tags: [Catalog]
      summary: Все настроения

  /api/ingredients:
    get:
      tags: [Catalog]
      summary: Все ингредиенты
      parameters:
        - in: query
          name: type
          schema: { type: string }

  /api/favorites:
    get:
      tags: [Favorites]
      summary: Избранное пользователя
      security: [{ bearerAuth: [] }]
    post:
      tags: [Favorites]
      summary: Добавить напиток в избранное
      security: [{ bearerAuth: [] }]

  /api/favorites/{drink_id}:
    delete:
      tags: [Favorites]
      summary: Удалить напиток из избранного
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: drink_id
          required: true
          schema: { type: integer }

  /api/preferences:
    get:
      tags: [Preferences]
      summary: Предпочтения пользователя по тегам
      security: [{ bearerAuth: [] }]
    post:
      tags: [Preferences]
      summary: Обновить предпочтения пользователя
      security: [{ bearerAuth: [] }]

  /api/recommendations:
    get:
      tags: [Recommendations]
      summary: Рекомендации по тегам пользователя
      security: [{ bearerAuth: [] }]

  /api/recommendations/mood/{mood_id}:
    get:
      tags: [Recommendations]
      summary: Рекомендации по настроению
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: mood_id
          required: true
          schema: { type: integer }

  /api/recommendations/daily:
    get:
      tags: [Recommendations]
      summary: Напиток дня
      security: [{ bearerAuth: [] }]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security: []
